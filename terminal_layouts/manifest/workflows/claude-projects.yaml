# claude-projects.yaml — Claude Projects workspace
# Multi-project session with cockpit, per-project tabs, and scratch

id: claude-projects
name: Claude Projects
description: Multi-project Claude session with cockpit, per-project dev tabs, and scratch
prefix: ""
cwd: $paths.projects

tabs:
  - id: cockpit
    name: cockpit
    emoji: 🏠
    focus: true
    panes:
      - direction: row
        children:
          - direction: column
            size: 60%
            children:
              - id: monitor
                name: monitor
                description: system monitor
                command: btop
                close_on_exit: false
              - id: shell
                name: shell
                description: general shell
                command: ""
          - id: usage
            name: usage
            description: Claude API usage (daily, compact)
            size: 40%
            command: bunx ccusage daily --instances --compact
            close_on_exit: false

  - id: brand-search
    name: brand-search
    emoji: 🔍
    cwd: /home/dev/projects/brand-search
    panes:
      - direction: row
        children:
          - id: claude
            name: claude
            description: claude — main workspace
            size: 70%
            focus: true
            command: ""
          - direction: column
            size: 30%
            children:
              - id: git
                name: git
                description: git status (auto-refresh)
                command: watch -n 5 -c git status -sb
                close_on_exit: false
              - id: logs
                name: logs
                description: tail dev log
                command: tail -f logs/dev.log
                close_on_exit: false

